name: 🐛 Bug Report
description: Report a bug or unexpected behavior in HazelJS
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Install '@hazeljs/core'
        2. Create a controller with '...'
        3. Run the application
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, I got...
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Please provide a minimal code sample that reproduces the issue
      render: typescript
      placeholder: |
        import { HazelApp, Controller, Get } from '@hazeljs/core';
        
        @Controller('/test')
        class TestController {
          @Get()
          test() {
            // Your code here
          }
        }

  - type: input
    id: hazeljs-version
    attributes:
      label: HazelJS Version
      description: Which version of HazelJS are you using?
      placeholder: e.g., 0.2.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Which version of Node.js are you using?
      placeholder: e.g., 20.11.0
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected Package(s)
      description: Which HazelJS package(s) are affected?
      multiple: true
      options:
        - "@hazeljs/core"
        - "@hazeljs/ai"
        - "@hazeljs/agent"
        - "@hazeljs/rag"
        - "@hazeljs/flow"
        - "@hazeljs/flow-runtime"
        - "@hazeljs/prompts"
        - "@hazeljs/auth"
        - "@hazeljs/prisma"
        - "@hazeljs/swagger"
        - "@hazeljs/cache"
        - "@hazeljs/websocket"
        - "@hazeljs/serverless"
        - "@hazeljs/cli"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Please paste any relevant error logs or stack traces
      render: shell
      placeholder: Paste error logs here...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, related issues, etc.)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided a minimal code sample that reproduces the issue
          required: false
        - label: I am using the latest version of HazelJS
          required: false
